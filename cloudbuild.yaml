steps:
  # Step 1: Compile the Java application using Maven
  - name: 'gcr.io/cloud-builders/mvn'
    args: ['package', '-DskipTests']

  # Step 2: Deploy the compiled application directly to App Engine
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['app', 'deploy', 'target/demo-0.0.1-SNAPSHOT.jar', '--quiet']

successBucket: 'gs://your-build-logs-bucket'
